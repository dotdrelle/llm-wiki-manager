# Root cockpit mapping for llm-wiki workspaces.
# Adjust paths and ports for each workspace you want to pilot from this root.
# `imports` is optional. If omitted or empty, `copy` copies nothing.

workspaces:
  example:
    path: /absolute/path/to/llm-wiki-workspace
    servePort: 3100
    mcpPort: 3101
    # Optional explicit export directories to copy into this wiki workspace raw/untracked.
    # imports:
    #   - ../agent-cme/data/exports/export-directory
